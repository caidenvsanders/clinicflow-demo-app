services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.gcp
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_scheduling}
      TZ: America/Los_Angeles
      PGTZ: America/Los_Angeles
    volumes:
      - clinicflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  appointment-scheduler:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.gcp
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      TZ: America/Los_Angeles
      PGTZ: America/Los_Angeles
    command: >
      sh -c "
        while true; do
          psql ${DATABASE_URL:-postgres://healthcare:change-this-password@postgres:5432/healthcare_scheduling}
          -c \"SELECT sync_overdue_scheduled_appointments();\" >/dev/null 2>&1;
          sleep 60;
        done
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.gcp
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://healthcare:change-this-password@postgres:5432/healthcare_scheduling}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  clinicflow_postgres_data:
